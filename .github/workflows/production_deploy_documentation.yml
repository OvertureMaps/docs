---
name: Production Deploy
run-name: Build and deploy production documentation

on:
  push:
    branches: [main]

  # Allow running from the actions tab
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read # required to checkout the code from the repo

jobs:
  build:
    name: Build the documentation and deploy
    if: github.repository == 'overturemaps/docs'
    runs-on: ubuntu-latest
    steps:
      - name: Check out the docs repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: package.json

      - name: Configure sustainable npm
        uses: lowlydba/sustainable-npm@31d51025884f424f58f22e4e6578178bb4e79632 # v3.0.0

      - name: Install NPM dependencies
        run: npm ci --prefer-dedupe

      - name: Build Docusaurus Pages 🔧
        run: npm run build

      - name: Setup Pages 🗂️
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Upload static files as GH-Pages artifact 📦
        id: docs-website
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
        with:
          path: build

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    environment:
      name: github-pages
      url: https://docs.overturemaps.org/
    runs-on: ubuntu-latest
    permissions:
      id-token: write # required for OIDC authentication with GitHub Pages
      pages: write # for actions/deploy-pages

    steps:
      - name: Deploy to GitHub Pages 🚀
        id: docs-website
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
