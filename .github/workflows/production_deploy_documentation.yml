---
name: Production Deploy
run-name: Build and deploy production documentation

on:
  push:
    branches: [main]

  # Allow running from the actions tab
  workflow_dispatch:

permissions:
  id-token: write # required to use OIDC authentication
  contents: read # required to checkout the code from the repo
  pages: write # for actions/deploy-pages

jobs:
  build:
    name: Build the documentation and deploy
    if: github.repository == 'overturemaps/docs'
    runs-on: ubuntu-latest
    steps:
      - name: Check out the docs repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json

      - name: Configure sustainable npm
        uses: lowlydba/sustainable-npm@31d51025884f424f58f22e4e6578178bb4e79632 # v3.0.0

      - name: Install NPM dependencies
        run: npm ci --prefer-dedupe

      - name: Build Docusaurus Pages 🔧
        run: npm run build

      - name: Setup Pages 🗂️
        uses: actions/configure-pages@v6

      - name: Upload static files as GH-Pages artifact 📦
        id: docs-website
        uses: actions/upload-pages-artifact@v4
        with:
          path: build

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    environment:
      name: github-pages
      url: https://docs.overturemaps.org/
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to GitHub Pages 🚀
        id: docs-website
        uses: actions/deploy-pages@v5
