---
name: Production Deploy
run-name: Build and deploy production documentation

on:
  push:
    branches: [main]

  # Allow running from the actions tab
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read # required to checkout the code from the repo

jobs:
  build:
    name: Build the documentation and deploy
    if: github.repository == 'overturemaps/docs'
    runs-on: ubuntu-latest
    steps:
      - name: Check out the docs repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: package.json

      - name: Configure sustainable npm
        uses: lowlydba/sustainable-npm@31d51025884f424f58f22e4e6578178bb4e79632 # v3.0.0

      - name: Install NPM dependencies
        run: npm ci --prefer-dedupe

      - name: Build Docusaurus Pages 🔧
        run: npm run build

      - name: Validate build output 🧪
        run: npm test

      - name: Setup Pages 🗂️
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Upload static files as GH-Pages artifact 📦
        id: docs-website
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: build

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    environment:
      name: github-pages
      url: https://docs.overturemaps.org/
    runs-on: ubuntu-latest
    permissions:
      id-token: write # required for OIDC authentication with GitHub Pages
      pages: write # for actions/deploy-pages

    steps:
      - name: Deploy to GitHub Pages 🚀
        id: docs-website
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
